site_name: Pulse
site_description: Batteries-included production observability for Spring Boot.
site_url: https://arun0009.github.io/pulse/
site_author: Arun Gopalpuri

repo_name: arun0009/pulse
repo_url: https://github.com/arun0009/pulse
edit_uri: edit/main/docs/

copyright: Copyright &copy; Arun Gopalpuri — released under the MIT License

theme:
  name: material
  logo: assets/pulse-logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - assets/pulse.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arun0009/pulse
      name: Pulse on GitHub
    - icon: simple/apachemaven
      link: https://central.sonatype.com/artifact/io.github.arun0009/pulse-spring-boot-starter
      name: Pulse on Maven Central

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - Concepts:
      - Overview: concepts.md
      - Web stack (Servlet-only): web-stack.md
      - Extending Pulse (SPIs): spi.md
  - Features:
      - features/index.md
      - Cross-cutting:
          - Conditional features (enabled-when): features/conditional-features.md
      - Day-one drivers:
          - Cardinality firewall: features/cardinality-firewall.md
          - Timeout budget: features/timeout-budget.md
          - Context propagation: features/context-propagation.md
          - Trace-context guard: features/trace-context-guard.md
          - Structured logs: features/structured-logs.md
          - Exception fingerprints: features/exception-fingerprints.md
      - Distributed-systems:
          - Dependency health: features/dependencies.md
          - Retry amplification: features/retry-amplification.md
          - Multi-tenant context: features/multi-tenant.md
          - Request priority: features/priority.md
          - Container memory: features/container-memory.md
          - Kafka time lag: features/kafka-time-lag.md
          - Request fan-out: features/fan-out.md
      - Spring extras:
          - SLO-as-code: features/slo-as-code.md
          - Resilience4j: features/resilience4j.md
          - Background jobs: features/jobs.md
          - Database (N+1): features/database.md
          - Cache (Caffeine): features/cache.md
          - OpenFeature: features/openfeature.md
          - Continuous profiling: features/profiling.md
          - Wide events: features/wide-events.md
          - Graceful shutdown: features/graceful-shutdown.md
          - Fleet config drift: features/fleet-config-drift.md
          - Diagnostic actuator: features/actuator.md
          - Sampling: features/sampling.md
      - Operational levers:
          - Dry-run / enforcement mode: features/enforcement-mode.md
          - Profile presets: features/profile-presets.md
          - Configuration validation: features/configuration-validation.md
  - Configuration: configuration.md
  - Operations:
      - Dashboards: operations/dashboards.md
      - Alerts: operations/alerts.md
      - Production checklist: operations/production-checklist.md
  - Runbooks:
      - runbooks/index.md
      - Cardinality firewall overflow: runbooks/cardinality-firewall-overflow.md
      - Timeout-budget exhausted: runbooks/timeout-budget-exhausted.md
      - Trace context missing: runbooks/trace-context-missing.md
      - Error-budget burn: runbooks/error-budget-burn.md
      - HikariCP saturation: runbooks/hikaricp-saturation.md
  - Reference:
      - Changelog: release/changelog.md
      - Spring Initializr listing: release/spring-initializr-listing.md
      - Design notes:
          - design/index.md
          - Design principles: design/principles.md
          - Multi-tenant context: design/multi-tenant-context.md
