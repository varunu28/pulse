# Pulse — Multi-window, multi-burn-rate SLO alerts + operational guardrail alerts.
#
# Pattern from the Google SRE workbook (https://sre.google/workbook/alerting-on-slos/).
# Two alerts per SLO: a fast one that fires on a 1h window with a 14.4x burn rate
# (page) and a slow one on a 6h window with a 3x burn rate (ticket). Both must
# trip before paging — this catches a real incident burning the error budget
# without paging on every 5xx blip.
#
# Default SLO: 99.9% availability (error-budget = 0.1%). Adjust `slo_target` and
# burn rates in the recording rules below if yours differs.
#
# For per-service SLO rules generated from application.yml, use:
#   curl -s http://<host>/actuator/pulse/slo | kubectl apply -f -

groups:
  - name: pulse-slo-recording
    interval: 30s
    rules:
      # 5xx error rate over multiple windows.
      - record: pulse:http_error_rate:1h
        expr: |
          sum by (application, env) (rate(http_server_requests_seconds_count{status=~"5.."}[1h]))
          /
          sum by (application, env) (rate(http_server_requests_seconds_count[1h]))
      - record: pulse:http_error_rate:6h
        expr: |
          sum by (application, env) (rate(http_server_requests_seconds_count{status=~"5.."}[6h]))
          /
          sum by (application, env) (rate(http_server_requests_seconds_count[6h]))

      # Latency: fraction of requests exceeding the 500ms SLO bucket.
      - record: pulse:http_latency_good_ratio:1h
        expr: |
          sum by (application, env) (rate(http_server_requests_seconds_bucket{le="0.5"}[1h]))
          /
          sum by (application, env) (rate(http_server_requests_seconds_count[1h]))
      - record: pulse:http_latency_good_ratio:6h
        expr: |
          sum by (application, env) (rate(http_server_requests_seconds_bucket{le="0.5"}[6h]))
          /
          sum by (application, env) (rate(http_server_requests_seconds_count[6h]))

      # Trace propagation health ratio (received / total).
      - record: pulse:trace_propagation_ratio:5m
        expr: |
          sum by (application, env) (rate(pulse_trace_received_total[5m]))
          /
          (
            sum by (application, env) (rate(pulse_trace_received_total[5m]))
            +
            sum by (application, env) (rate(pulse_trace_missing_total[5m]))
          )

  - name: pulse-slo-alerts
    rules:
      # ── Availability SLO (burn-rate) ──────────────────────────────────
      - alert: PulseHighErrorBudgetBurnFast
        expr: |
          pulse:http_error_rate:1h > (14.4 * 0.001)
          and
          pulse:http_error_rate:6h > (6 * 0.001)
        for: 2m
        labels:
          severity: page
          slo: availability
        annotations:
          summary: "{{ $labels.application }} ({{ $labels.env }}) is burning error budget fast"
          description: |
            5xx rate is {{ printf "%.2f%%" (mul (.Value) 100) }} over the last 1h —
            14.4x the budgeted burn for a 99.9% SLO.
            At this rate the monthly error budget will be exhausted in <2 days.
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/error-budget-burn.md"

      - alert: PulseHighErrorBudgetBurnSlow
        expr: |
          pulse:http_error_rate:6h > (3 * 0.001)
        for: 15m
        labels:
          severity: ticket
          slo: availability
        annotations:
          summary: "{{ $labels.application }} ({{ $labels.env }}) error budget burning steadily"
          description: |
            6h error rate is {{ printf "%.2f%%" (mul (.Value) 100) }} —
            consistent enough to exhaust the monthly budget if not addressed this week.

      # ── Latency SLO (burn-rate) ───────────────────────────────────────
      - alert: PulseLatencyBudgetBurnFast
        expr: |
          (1 - pulse:http_latency_good_ratio:1h) > (14.4 * 0.05)
          and
          (1 - pulse:http_latency_good_ratio:6h) > (6 * 0.05)
        for: 2m
        labels:
          severity: page
          slo: latency
        annotations:
          summary: "{{ $labels.application }} ({{ $labels.env }}) latency SLO burning fast"
          description: |
            More than {{ printf "%.1f%%" (mul (.Value) 100) }} of requests exceeded 500ms
            over the last 1h — 14.4x the sustainable burn for a 95% latency SLO.
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/error-budget-burn.md"

      - alert: PulseLatencyBudgetBurnSlow
        expr: |
          (1 - pulse:http_latency_good_ratio:6h) > (3 * 0.05)
        for: 15m
        labels:
          severity: ticket
          slo: latency
        annotations:
          summary: "{{ $labels.application }} ({{ $labels.env }}) latency SLO burning steadily"
          description: |
            6h fraction of requests exceeding 500ms is burning the latency budget
            fast enough to exhaust it within weeks.

      # ── Guardrail: cardinality firewall ───────────────────────────────
      - alert: PulseCardinalityFirewallOverflow
        expr: |
          sum by (application, env) (rate(pulse_cardinality_overflow_total[10m])) > 0
        for: 5m
        labels:
          severity: ticket
          slo: cost
        annotations:
          summary: "{{ $labels.application }}: Pulse capped a runaway-cardinality tag"
          description: |
            Pulse rewrote at least one metric tag value to the overflow bucket in the
            last 10m. This means an instrumentation point exceeded the configured
            cardinality cap and should be investigated.
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/cardinality-firewall-overflow.md"

      # ── Guardrail: timeout budget ─────────────────────────────────────
      - alert: PulseTimeoutBudgetExhaustion
        expr: |
          sum by (application, env) (rate(pulse_timeout_budget_exhausted_total[5m])) > 0.05
        for: 10m
        labels:
          severity: ticket
          slo: latency
        annotations:
          summary: "{{ $labels.application }}: requests arriving at downstreams with no budget left"
          description: |
            >5% of outbound attempts are being made with zero remaining timeout
            budget. Either upstream budgets are unrealistic or this service is
            spending too much of its budget before fan-out.
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/timeout-budget-exhausted.md"

      # ── Guardrail: trace propagation ──────────────────────────────────
      - alert: PulseTraceContextMissing
        expr: |
          pulse:trace_propagation_ratio:5m < 0.99
        for: 10m
        labels:
          severity: ticket
          slo: observability
        annotations:
          summary: "{{ $labels.application }} ({{ $labels.env }}): >1% of requests missing trace context"
          description: |
            The trace propagation health ratio dropped below 99% for 10 minutes.
            An upstream caller is not forwarding traceparent/b3 headers. Check
            pulse.trace.missing per-route breakdown in the Pulse dashboard.
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/trace-context-missing.md"

      # ── Infrastructure: OTel exporter ─────────────────────────────────
      - alert: PulseOtelExporterFailures
        expr: |
          sum by (job) (rate(otelcol_exporter_send_failed_spans[5m])) > 0
        for: 5m
        labels:
          severity: ticket
          slo: observability
        annotations:
          summary: "OTel Collector failing to export spans"
          description: |
            The OTel Collector has been dropping spans for 5 minutes.
            Check the exporter configuration, network connectivity, and
            backend (Jaeger/Tempo) availability.

      # ── Latency: p99 absolute ─────────────────────────────────────────
      - alert: PulseHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (application, env, le) (rate(http_server_requests_seconds_bucket[10m]))
          ) > 1.0
        for: 10m
        labels:
          severity: ticket
          slo: latency
        annotations:
          summary: "{{ $labels.application }}: p99 > 1s for 10m"
          description: "p99 = {{ $value }}s"

      # ── Saturation: HikariCP connection pool ──────────────────────────
      # Spring Boot exposes hikaricp.connections.* via Micrometer when HikariCP
      # is on the classpath. Pulse adds these alerts so a saturated pool is
      # surfaced before requests start timing out at the JDBC layer.
      - alert: PulseHikariCpExhausted
        expr: |
          sum by (application, env, pool)
            (hikaricp_connections_pending) > 0
          and
          (
            sum by (application, env, pool) (hikaricp_connections_active)
            /
            sum by (application, env, pool) (hikaricp_connections_max)
          ) >= 0.95
        for: 2m
        labels:
          severity: page
          slo: saturation
          subsystem: jdbc
        annotations:
          summary: "{{ $labels.application }} HikariCP pool {{ $labels.pool }} exhausted"
          description: |
            Connection pool {{ $labels.pool }} is ≥95% utilized AND threads are queued
            waiting for a connection. New requests will block on `getConnection()` until
            an existing one is returned. Likely causes: a slow downstream query, a leak
            (connections checked out and never returned), or a pool size that is too small
            for current traffic.
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/hikaricp-saturation.md"

      - alert: PulseHikariCpConnectionAcquireSlow
        expr: |
          histogram_quantile(0.95,
            sum by (application, env, pool, le)
              (rate(hikaricp_connections_acquire_seconds_bucket[5m]))
          ) > 0.1
        for: 10m
        labels:
          severity: ticket
          slo: latency
          subsystem: jdbc
        annotations:
          summary: "{{ $labels.application }} HikariCP pool {{ $labels.pool }} acquire p95 > 100ms"
          description: |
            p95 connection-acquire latency on pool {{ $labels.pool }} has exceeded 100ms
            for 10 minutes. The pool is becoming a bottleneck — check active vs max
            utilization and slow-query traces.

      - alert: PulseHikariCpConnectionTimeoutsRising
        expr: |
          sum by (application, env, pool)
            (rate(hikaricp_connections_timeout_total[5m])) > 0
        for: 5m
        labels:
          severity: page
          slo: availability
          subsystem: jdbc
        annotations:
          summary: "{{ $labels.application }} HikariCP pool {{ $labels.pool }} returning timeouts"
          description: |
            Threads are timing out waiting for a connection from pool {{ $labels.pool }}.
            Each timeout becomes a 500 to the caller. Increase pool size or fix the
            query / leak holding connections open.

      # ── Dependency health map (caller-side per-downstream RED) ────────
      # Pulse tags every outbound HTTP call with `dep` (logical dependency
      # name from pulse.dependencies.map). When a single downstream's error
      # rate or latency goes bad, you get an alert that names the culprit
      # without needing to open the downstream's dashboard.
      - alert: PulseDependencyDegraded
        expr: |
          sum by (application, env, dep)
            (rate(pulse_dependency_requests_total{outcome=~"SERVER_ERROR|UNKNOWN"}[5m]))
          /
          sum by (application, env, dep)
            (rate(pulse_dependency_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: ticket
          slo: availability
          subsystem: dependency
        annotations:
          summary: "{{ $labels.application }}: dependency {{ $labels.dep }} >5% errors"
          description: |
            {{ $labels.application }} is seeing a {{ printf "%.1f%%" (mul $value 100) }} error
            rate calling {{ $labels.dep }} over the last 5m. Open the dependency map panel
            to confirm whether this is the only affected caller (downstream issue) or a
            pattern across all callers of this dep (network / config issue).
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/dependency-degraded.md"

      - alert: PulseDependencyLatencyP99High
        expr: |
          histogram_quantile(0.99,
            sum by (application, env, dep, le)
              (rate(pulse_dependency_latency_seconds_bucket[10m]))
          ) > 1.0
        for: 10m
        labels:
          severity: ticket
          slo: latency
          subsystem: dependency
        annotations:
          summary: "{{ $labels.application }}: p99 latency to {{ $labels.dep }} > 1s"
          description: |
            10-min p99 latency calling {{ $labels.dep }} = {{ $value }}s. Either the
            downstream is degraded or the network path to it has changed.

      # ── Request fan-out width (caller-side N+1 detector) ─────────────
      # pulse.request.fan_out_high fires whenever a single inbound request
      # fans out to more outbound calls than pulse.dependencies.fan-out-warn-threshold.
      # Most stable endpoints have fan-out width <10; a sudden p99 climb is
      # almost always a caller-side N+1 introduced by a recent change.
      - alert: PulseRequestFanOutHigh
        expr: |
          sum by (application, env)
            (rate(pulse_request_fan_out_high_total[5m])) > 0.05
        for: 10m
        labels:
          severity: ticket
          slo: latency
          subsystem: dependency
        annotations:
          summary: "{{ $labels.application }}: requests with abnormally high outbound fan-out"
          description: |
            >5% of inbound requests fanned out beyond the configured warn threshold
            in the last 5m. Check the per-endpoint pulse.request.fan_out distribution
            to find the offending route — this is usually an N+1 at the caller layer
            introduced by a recent change.

      # ── Retry amplification (cross-service cascade detector) ─────────
      # Pulse propagates a per-request retry-depth counter through the call
      # chain (X-Pulse-Retry-Depth header). When inbound depth crosses
      # pulse.retry.amplification-threshold (default 3), Pulse increments
      # pulse.retry.amplification_total. A single hit is an early-warning
      # sign of a forming cascade; >5% of traffic is the cascade itself.
      - alert: PulseRetryAmplification
        expr: |
          sum by (application, env, endpoint)
            (rate(pulse_retry_amplification_total[5m])) > 0.05
        for: 5m
        labels:
          severity: page
          slo: availability
          subsystem: resilience
        annotations:
          summary: "{{ $labels.application }}: retry amplification on {{ $labels.endpoint }}"
          description: |
            >5% of requests to {{ $labels.endpoint }} arrived with retry-depth above the
            configured threshold. A retry storm is forming somewhere in the call chain.
            Combined with PulseTimeoutBudgetExhaustion, this is the signature of a
            cascading failure in progress — find the root cause downstream and
            consider temporarily disabling retries on affected paths.
          runbook_url: "https://github.com/arun0009/pulse/blob/main/docs/runbooks/retry-amplification.md"
