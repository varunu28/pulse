name: Native image smoke

# Catches Pulse changes that would break a Spring Boot 4+ AOT/GraalVM build before they
# land on main. The job is intentionally a *smoke test*: it builds the showcase edge service
# (which exercises the full Pulse auto-config tree) as a native image and exits — it does not
# run the resulting binary. The point is that AOT processing succeeds and the GraalVM compiler
# can resolve every reachable type.
#
# Why this matters: Pulse's auto-config registers reflection hints in PulseRuntimeHints, and
# any new bean wired through reflection (e.g. a new ObservationHandler, a new SPI loader) needs
# matching hints. Without this gate, those misses surface only when a downstream user adopts
# Pulse on Spring Native — a costly debugging loop. The CI job catches them in the PR that
# introduced them.

on:
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - "examples/showcase/**"
      - ".github/workflows/native-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-image:
    name: GraalVM native image (showcase/edge)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # One shell session: `install` must succeed before the showcase resolves
      # `io.github.arun0009:pulse-spring-boot-starter` from ~/.m2 (it is not published on PR builds).
      # Always invoke the second Maven run from the repo root with `-f examples/showcase/pom.xml`
      # so we reuse the same wrapper and local repository as step 1 (avoids cwd / path confusion).
      - name: Install Pulse and build showcase edge (native image)
        run: |
          set -euo pipefail
          ./mvnw -B -ntp -DskipTests -Dspotless.check.skip=true install
          PULSE_VERSION=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          PULSE_LOCAL="$HOME/.m2/repository/io/github/arun0009/pulse-spring-boot-starter/$PULSE_VERSION"
          if ! compgen -G "$PULSE_LOCAL/pulse-spring-boot-starter-*.jar" > /dev/null; then
            echo "::error::Expected pulse-spring-boot-starter jar under $PULSE_LOCAL after install. Did the install step fail?"
            ls -la "$HOME/.m2/repository/io/github/arun0009/pulse-spring-boot-starter/" 2>/dev/null || true
            exit 1
          fi
          ./mvnw -B -ntp -f examples/showcase/pom.xml -Pnative -DskipTests -pl edge -am \
            -Dspring-boot.aot.enabled=true \
            package
